<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop - 3D Transmission Tools</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#111;
}

header{
background:#111;
color:white;
padding:20px;
}

header h1{
margin:0 0 10px 0;
}

header a{
color:white;
text-decoration:none;
margin-right:15px;
font-weight:bold;
}

header a:hover{
text-decoration:underline;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
}

.image{
height:220px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
box-sizing:border-box;
}

.image img{
width:100%;
height:100%;
object-fit:contain;
display:block;
cursor:pointer;
}

.card h3{
margin:10px 0;
font-size:18px;
line-height:1.3;
}

.description{
color:#555;
font-size:14px;
line-height:1.5;
min-height:42px;
}

.price{
font-size:20px;
font-weight:bold;
margin-top:auto;
}

.stock{
font-size:13px;
color:#666;
margin-top:6px;
}

button{
background:black;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

button:hover{
background:#333;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
box-sizing:border-box;
}

.lightbox.show{
display:flex;
}

.lightbox-content{
position:relative;
max-width:95vw;
max-height:90vh;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.lightbox img{
max-width:95vw;
max-height:75vh;
object-fit:contain;
background:white;
padding:10px;
border-radius:8px;
}

.lightbox-controls{
display:flex;
align-items:center;
gap:12px;
}

.lightbox-controls button{
margin-top:0;
padding:10px 14px;
font-size:16px;
}

.lightbox-counter{
color:white;
font-weight:bold;
min-width:60px;
text-align:center;
}

.close-btn{
position:absolute;
top:-10px;
right:-10px;
background:white;
color:black;
border:none;
border-radius:999px;
width:36px;
height:36px;
font-size:20px;
font-weight:bold;
cursor:pointer;
line-height:1;
padding:0;
}

.close-btn:hover{
background:#ddd;
}
</style>

</head>

<body>

<header>
<h1>3D Transmission Tools</h1>
<a href="/">Home</a>
<a href="/shop.html">Shop</a>
</header>

<div class="container">

<h2>All Products</h2>

<div id="products" class="grid"></div>

</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeLightbox(event)">×</button>
    <img id="lightbox-img" src="" alt="Full size product image">
    <div class="lightbox-controls">
      <button onclick="prevImage()">‹ Prev</button>
      <div id="lightbox-counter" class="lightbox-counter">1 / 1</div>
      <button onclick="nextImage()">Next ›</button>
    </div>
  </div>
</div>

<script>
let currentGallery = []
let currentImageIndex = 0

async function loadProducts(){

const res = await fetch("products.json")
const products = await res.json()

const container = document.getElementById("products")

products.forEach(product=>{

const card=document.createElement("div")
card.className="card"

const gallery =
product.images && product.images.length
? product.images
: (product.image ? [product.image] : [])

const firstImage = gallery.length ? gallery[0] : ""

const escapedGallery = encodeURIComponent(JSON.stringify(gallery))

const imageHtml = firstImage
? `<img src="${firstImage}" alt="${product.name}" onclick="openLightbox('${escapedGallery}', 0)">`
: "No Image Yet"

card.innerHTML=`
<div class="image">${imageHtml}</div>
<h3>${product.name}</h3>
<div class="description">${product.description || ""}</div>
<div class="price">$${Number(product.price).toFixed(2)}</div>
<div class="stock">In stock: ${product.quantity}</div>
<button onclick="buy('${product.name.replace(/'/g,"\\'")}',${product.price})">
Buy Now
</button>
`

container.appendChild(card)

})

}

function openLightbox(encodedGallery, startIndex){
currentGallery = JSON.parse(decodeURIComponent(encodedGallery))
currentImageIndex = startIndex || 0
updateLightboxImage()
document.getElementById("lightbox").classList.add("show")
}

function updateLightboxImage(){
if(!currentGallery.length) return
document.getElementById("lightbox-img").src = currentGallery[currentImageIndex]
document.getElementById("lightbox-counter").textContent = `${currentImageIndex + 1} / ${currentGallery.length}`
}

function prevImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex - 1 + currentGallery.length) % currentGallery.length
updateLightboxImage()
}

function nextImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex + 1) % currentGallery.length
updateLightboxImage()
}

function closeLightbox(event){
if(event) event.stopPropagation()
document.getElementById("lightbox").classList.remove("show")
}

document.addEventListener("keydown", function(event){
const lightboxOpen = document.getElementById("lightbox").classList.contains("show")
if(!lightboxOpen) return

if(event.key === "Escape") closeLightbox()
if(event.key === "ArrowLeft") prevImage()
if(event.key === "ArrowRight") nextImage()
})

async function buy(name,price){

const res = await fetch("/api/create-checkout-session",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price})
})

const data = await res.json()

window.location=data.url

}

loadProducts()
</script>

</body>
</html>
