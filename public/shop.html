<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop - 3D Transmission Tools</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#111;
}

header{
background:#111;
color:white;
padding:20px;
}

header h1{
margin:0 0 10px 0;
}

header a{
color:white;
text-decoration:none;
margin-right:15px;
font-weight:bold;
}

header a:hover{
text-decoration:underline;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:12px;
margin:20px 0 30px 0;
}

.filters input,
.filters select{
padding:12px;
font-size:15px;
border:1px solid #ccc;
border-radius:6px;
background:white;
}

.filters input{
flex:1;
min-width:240px;
}

.result-count{
margin-bottom:20px;
color:#555;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
}

.image{
height:220px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
box-sizing:border-box;
}

.image img{
width:100%;
height:100%;
object-fit:contain;
display:block;
cursor:pointer;
}

.card h3{
margin:10px 0 4px 0;
font-size:18px;
line-height:1.3;
}

.category{
display:inline-block;
background:#eee;
color:#444;
font-size:12px;
font-weight:bold;
padding:4px 8px;
border-radius:4px;
margin-bottom:8px;
text-transform:uppercase;
letter-spacing:.5px;
}

.description{
color:#555;
font-size:14px;
line-height:1.5;
min-height:42px;
}

.price{
font-size:20px;
font-weight:bold;
margin-top:auto;
}

.stock{
font-size:13px;
color:#666;
margin-top:6px;
}

.quantity-wrap{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

.quantity-label{
font-size:14px;
font-weight:bold;
color:#333;
min-width:28px;
}

.quantity-controls{
display:inline-flex;
align-items:center;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
background:white;
}

.quantity-controls button{
margin:0;
padding:0;
width:36px;
height:36px;
background:#f3f3f3;
color:#111;
border:none;
border-radius:0;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.quantity-controls button:hover{
background:#e3e3e3;
}

.quantity-controls input{
width:56px;
height:36px;
border:none;
border-left:1px solid #ccc;
border-right:1px solid #ccc;
text-align:center;
font-size:15px;
outline:none;
}

.buy-btn{
background:black;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.buy-btn:hover{
background:#333;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
box-sizing:border-box;
}

.lightbox.show{
display:flex;
}

.lightbox-content{
position:relative;
max-width:95vw;
max-height:90vh;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.lightbox img{
max-width:95vw;
max-height:65vh;
object-fit:contain;
background:white;
padding:10px;
border-radius:8px;
}

.lightbox-controls{
display:flex;
align-items:center;
gap:12px;
}

.lightbox-controls button{
margin-top:0;
padding:10px 14px;
font-size:16px;
}

.lightbox-counter{
color:white;
font-weight:bold;
min-width:60px;
text-align:center;
}

.thumbnail-strip{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
max-width:95vw;
}

.thumbnail{
width:64px;
height:64px;
border:2px solid transparent;
border-radius:6px;
overflow:hidden;
background:white;
cursor:pointer;
padding:0;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.thumbnail.active{
border-color:#4da3ff;
}

.close-btn{
position:absolute;
top:-10px;
right:-10px;
background:white;
color:black;
border:none;
border-radius:999px;
width:36px;
height:36px;
font-size:20px;
font-weight:bold;
cursor:pointer;
line-height:1;
padding:0;
}

.close-btn:hover{
background:#ddd;
}

.empty-message{
background:white;
border:1px solid #ddd;
border-radius:8px;
padding:30px;
text-align:center;
color:#666;
}
</style>

</head>

<body>

<header>
<h1>3D Transmission Tools</h1>
<a href="/">Home</a>
<a href="/shop.html">Shop</a>
<a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
</header>

<div class="container">

<h2>All Products</h2>

<div class="filters">
<input type="text" id="searchInput" placeholder="Search products...">

<select id="categoryFilter">
<option value="all">All Categories</option>
</select>

<select id="sortFilter">
<option value="default">Sort By</option>
<option value="priceLow">Price: Low to High</option>
<option value="priceHigh">Price: High to Low</option>
<option value="nameAZ">Name: A to Z</option>
<option value="nameZA">Name: Z to A</option>
</select>
</div>

<div id="resultCount" class="result-count"></div>

<div id="products" class="grid"></div>

</div>

<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
<div class="lightbox-content" onclick="event.stopPropagation()">
<button class="close-btn" onclick="closeLightbox(event)">×</button>
<img id="lightbox-img" src="" alt="Full size product image">

<div class="lightbox-controls">
<button onclick="prevImage()">‹ Prev</button>
<div id="lightbox-counter" class="lightbox-counter">1 / 1</div>
<button onclick="nextImage()">Next ›</button>
</div>

<div id="thumbnail-strip" class="thumbnail-strip"></div>
</div>
</div>

<script src="/cart.js"></script>

<script>
let currentGallery = []
let currentImageIndex = 0
let allProducts = []

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function getSafeMaxQty(product){
const stock = Number(product.quantity ?? 99)
if(Number.isFinite(stock) && stock > 0){
return Math.min(stock, 99)
}
return 99
}

function changeQty(inputId, delta){
const input = document.getElementById(inputId)
if(!input) return

const min = Number(input.min || 1)
const max = Number(input.max || 99)
const current = Number(input.value || min)
const next = current + delta

input.value = Math.max(min, Math.min(max, next))
}

function getQty(productId){
const input = document.getElementById("qty-" + productId)
if(!input) return 1

const min = Number(input.min || 1)
const max = Number(input.max || 99)
let value = Number(input.value || 1)

if(!Number.isInteger(value) || value < min) value = min
if(value > max) value = max

input.value = value
return value
}

async function loadProducts(){
const res = await fetch("products.json")
allProducts = await res.json()

populateCategories()
applyFilters()
}

function populateCategories(){
const categoryFilter = document.getElementById("categoryFilter")

const categories = [...new Set(
allProducts
.map(product => product.category)
.filter(category => category && category.trim() !== "")
)]

categories.sort((a,b)=>a.localeCompare(b))

categories.forEach(category=>{
const option=document.createElement("option")
option.value=category
option.textContent=category
categoryFilter.appendChild(option)
})
}

function applyFilters(){

const searchValue=document.getElementById("searchInput").value.toLowerCase().trim()
const selectedCategory=document.getElementById("categoryFilter").value
const sortValue=document.getElementById("sortFilter").value

let filteredProducts=allProducts.filter(product=>{

const name=(product.name||"").toLowerCase()
const description=(product.description||"").toLowerCase()
const category=(product.category||"").toLowerCase()

const matchesSearch=
searchValue==="" ||
name.includes(searchValue) ||
description.includes(searchValue) ||
category.includes(searchValue)

const matchesCategory=
selectedCategory==="all" ||
product.category===selectedCategory

return matchesSearch && matchesCategory
})

if(sortValue==="priceLow"){
filteredProducts.sort((a,b)=>Number(a.price)-Number(b.price))
}

if(sortValue==="priceHigh"){
filteredProducts.sort((a,b)=>Number(b.price)-Number(a.price))
}

if(sortValue==="nameAZ"){
filteredProducts.sort((a,b)=>(a.name||"").localeCompare(b.name||""))
}

if(sortValue==="nameZA"){
filteredProducts.sort((a,b)=>(b.name||"").localeCompare(a.name||""))
}

renderProducts(filteredProducts)
}

function renderProducts(products){

const container=document.getElementById("products")
const resultCount=document.getElementById("resultCount")

container.innerHTML=""
resultCount.textContent=`${products.length} product${products.length===1?"":"s"} found`

if(products.length===0){
container.innerHTML=`<div class="empty-message">No products found. Try a different search or category.</div>`
return
}

products.forEach(product=>{

const card=document.createElement("div")
card.className="card"

const gallery=
product.images && product.images.length
? product.images
: (product.image ? [product.image] : [])

const firstImage=gallery.length ? gallery[0] : ""
const escapedGallery=encodeURIComponent(JSON.stringify(gallery))
const safeId=String(product.id)
const safeName=escapeHtml(product.name)
const safeDescription=escapeHtml(product.description || "")
const safeCategory=escapeHtml(product.category || "")
const maxQty=getSafeMaxQty(product)

const imageHtml=firstImage
? `<img src="${firstImage}" alt="${safeName}" onclick="openLightbox('${escapedGallery}', 0)">`
: "No Image Yet"

card.innerHTML=`
<div class="image">${imageHtml}</div>
<h3>${safeName}</h3>
${product.category ? `<div class="category">${safeCategory}</div>` : ""}
<div class="description">${safeDescription}</div>
<div class="price">$${Number(product.price).toFixed(2)}</div>
<div class="stock">In stock: ${product.quantity ?? 0}</div>

<div class="quantity-wrap">
<div class="quantity-label">Qty</div>
<div class="quantity-controls">
<button type="button" onclick="changeQty('qty-${safeId}', -1)">−</button>
<input
id="qty-${safeId}"
type="number"
min="1"
max="${maxQty}"
value="1"
inputmode="numeric"
>
<button type="button" onclick="changeQty('qty-${safeId}', 1)">+</button>
</div>
</div>

<button class="buy-btn" onclick="addProductToCart('${safeId.replace(/'/g,"\\'")}')">
Add To Cart
</button>
`

container.appendChild(card)

})
}

function addProductToCart(id){
const quantity = getQty(id)
addToCart(id, quantity)
}

function openLightbox(encodedGallery,startIndex){
currentGallery=JSON.parse(decodeURIComponent(encodedGallery))
currentImageIndex=startIndex||0
updateLightboxImage()
renderThumbnails()
document.getElementById("lightbox").classList.add("show")
}

function updateLightboxImage(){
if(!currentGallery.length) return
document.getElementById("lightbox-img").src=currentGallery[currentImageIndex]
document.getElementById("lightbox-counter").textContent=`${currentImageIndex+1} / ${currentGallery.length}`
updateActiveThumbnail()
}

function renderThumbnails(){
const strip=document.getElementById("thumbnail-strip")
strip.innerHTML=""

currentGallery.forEach((src,index)=>{
const thumb=document.createElement("button")
thumb.className="thumbnail"+(index===currentImageIndex?" active":"")
thumb.innerHTML=`<img src="${src}">`
thumb.onclick=function(){
currentImageIndex=index
updateLightboxImage()
}
strip.appendChild(thumb)
})
}

function updateActiveThumbnail(){
const thumbs=document.querySelectorAll(".thumbnail")
thumbs.forEach((thumb,index)=>{
thumb.classList.toggle("active",index===currentImageIndex)
})
}

function prevImage(){
if(!currentGallery.length) return
currentImageIndex=(currentImageIndex-1+currentGallery.length)%currentGallery.length
updateLightboxImage()
}

function nextImage(){
if(!currentGallery.length) return
currentImageIndex=(currentImageIndex+1)%currentGallery.length
updateLightboxImage()
}

function closeLightbox(event){
if(event) event.stopPropagation()
document.getElementById("lightbox").classList.remove("show")
}

document.addEventListener("keydown",function(event){
const lightboxOpen=document.getElementById("lightbox").classList.contains("show")
if(!lightboxOpen) return

if(event.key==="Escape") closeLightbox()
if(event.key==="ArrowLeft") prevImage()
if(event.key==="ArrowRight") nextImage()
})

document.getElementById("searchInput").addEventListener("input",applyFilters)
document.getElementById("categoryFilter").addEventListener("change",applyFilters)
document.getElementById("sortFilter").addEventListener("change",applyFilters)

loadProducts()
</script>

</body>
</html>
