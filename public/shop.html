<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shop - 3D Transmission Tools</title>

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#111;
}

/* ---------- BANNER HEADER ---------- */

.site-header{
background:#111;
text-align:center;
}

.banner{
background:white;
padding:10px 0;
border-bottom:2px solid #ddd;
}

.banner img{
max-width:100%;
height:auto;
max-height:160px;
object-fit:contain;
}

.nav-links{
padding:12px;
}

.nav-links a{
color:white;
text-decoration:none;
margin:0 15px;
font-weight:bold;
}

.nav-links a:hover{
text-decoration:underline;
}

/* ---------- MAIN LAYOUT ---------- */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.filters{
display:flex;
flex-wrap:wrap;
gap:12px;
margin:20px 0 30px 0;
}

.filters input,
.filters select{
padding:12px;
font-size:15px;
border:1px solid #ccc;
border-radius:6px;
background:white;
}

.filters input{
flex:1;
min-width:240px;
}

.result-count{
margin-bottom:20px;
color:#555;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
padding:15px;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
}

.image{
height:220px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
box-sizing:border-box;
}

.image img{
width:100%;
height:100%;
object-fit:contain;
display:block;
cursor:pointer;
}

.card h3{
margin:10px 0 4px 0;
font-size:18px;
line-height:1.3;
}

.category{
display:inline-block;
background:#eee;
color:#444;
font-size:12px;
font-weight:bold;
padding:4px 8px;
border-radius:4px;
margin-bottom:8px;
text-transform:uppercase;
letter-spacing:.5px;
}

.description{
color:#555;
font-size:14px;
line-height:1.5;
min-height:42px;
}

.price{
font-size:20px;
font-weight:bold;
margin-top:auto;
}

.stock{
font-size:13px;
color:#666;
margin-top:6px;
}

.quantity-wrap{
display:flex;
align-items:center;
gap:8px;
margin-top:10px;
}

.quantity-label{
font-size:14px;
font-weight:bold;
color:#333;
min-width:28px;
}

.quantity-controls{
display:inline-flex;
align-items:center;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
background:white;
}

.quantity-controls button{
margin:0;
padding:0;
width:36px;
height:36px;
background:#f3f3f3;
color:#111;
border:none;
border-radius:0;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.quantity-controls button:hover{
background:#e3e3e3;
}

.quantity-controls input{
width:56px;
height:36px;
border:none;
border-left:1px solid #ccc;
border-right:1px solid #ccc;
text-align:center;
font-size:15px;
outline:none;
}

.buy-btn{
background:black;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
border-radius:6px;
font-weight:bold;
}

.buy-btn:hover{
background:#333;
}

/* ---------- LIGHTBOX ---------- */

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
box-sizing:border-box;
}

.lightbox.show{
display:flex;
}

.lightbox-content{
position:relative;
max-width:95vw;
max-height:90vh;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.lightbox img{
max-width:95vw;
max-height:65vh;
object-fit:contain;
background:white;
padding:10px;
border-radius:8px;
}

.lightbox-controls{
display:flex;
align-items:center;
gap:12px;
}

.lightbox-controls button{
margin-top:0;
padding:10px 14px;
font-size:16px;
}

.lightbox-counter{
color:white;
font-weight:bold;
min-width:60px;
text-align:center;
}

.thumbnail-strip{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
max-width:95vw;
}

.thumbnail{
width:64px;
height:64px;
border:2px solid transparent;
border-radius:6px;
overflow:hidden;
background:white;
cursor:pointer;
padding:0;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.thumbnail.active{
border-color:#4da3ff;
}

.close-btn{
position:absolute;
top:-10px;
right:-10px;
background:white;
color:black;
border:none;
border-radius:999px;
width:36px;
height:36px;
font-size:20px;
font-weight:bold;
cursor:pointer;
line-height:1;
padding:0;
}

.close-btn:hover{
background:#ddd;
}

.empty-message{
background:white;
border:1px solid #ddd;
border-radius:8px;
padding:30px;
text-align:center;
color:#666;
}

</style>
</head>

<body>

<header class="site-header">

<div class="banner">
<img src="/logo.png" alt="3D Transmission Tools">
</div>

<div class="nav-links">
<a href="/">Home</a>
<a href="/shop.html">Shop</a>
<a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
</div>

</header>

<div class="container">

<h2>All Products</h2>

<div class="filters">
<input type="text" id="searchInput" placeholder="Search products...">

<select id="categoryFilter">
<option value="all">All Categories</option>
</select>

<select id="sortFilter">
<option value="default">Sort By</option>
<option value="priceLow">Price: Low to High</option>
<option value="priceHigh">Price: High to Low</option>
<option value="nameAZ">Name: A to Z</option>
<option value="nameZA">Name: Z to A</option>
</select>
</div>

<div id="resultCount" class="result-count"></div>

<div id="products" class="grid"></div>

</div>

<script src="/cart.js"></script>

<script>
/* your original JS remains unchanged */
</script>

</body>
</html>
