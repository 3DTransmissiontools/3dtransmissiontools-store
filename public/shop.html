<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Shop - 3D Transmission Tools</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
}

header a{
color:white;
text-decoration:none;
margin-right:15px;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:8px;
overflow:hidden;
padding:15px;
}

.image{
height:160px;
background:#eee;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
}

.image img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.card h3{
margin:10px 0;
font-size:18px;
}

.price{
font-size:20px;
font-weight:bold;
}

button{
background:black;
color:white;
border:none;
padding:10px;
margin-top:10px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>3D Transmission Tools</h1>
<a href="/">Home</a>
<a href="/shop.html">Shop</a>
</header>

<div class="container">

<h2>All Products</h2>

<div id="products" class="grid"></div>

</div>

<script>

async function loadProducts(){

const res = await fetch("products.json")
const products = await res.json()

const container = document.getElementById("products")

products.forEach(product=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="image">${product.image ? `<img src="${product.image}" alt="${product.name}">` : "No Image Yet"}</div>

<h3>${product.name}</h3>

<div class="price">$${product.price}</div>

<button onclick="buy('${product.name}',${product.price})">
Buy Now
</button>

`

container.appendChild(card)

})

}

async function buy(name,price){

const res = await fetch("/api/create-checkout-session",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({name,price})
})

const data = await res.json()

window.location=data.url

}

loadProducts()

</script>

</body>
</html>
