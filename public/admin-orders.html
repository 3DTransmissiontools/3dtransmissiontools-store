<!DOCTYPE html>
<html>
<head>
<title>Orders Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:30px;
}

.order{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
}

button{
padding:8px 12px;
margin-top:8px;
cursor:pointer;
}

input{
padding:6px;
}

</style>

</head>

<body>

<h1>Orders</h1>

<div id="orders"></div>

<script>

async function loadOrders(){

const res = await fetch("/api/orders");
const orders = await res.json();

const container = document.getElementById("orders");

container.innerHTML="";

orders.forEach(order=>{

const div = document.createElement("div");

div.className="order";

div.innerHTML=`

<b>Order:</b> ${order.id}<br>
<b>Date:</b> ${order.date}<br>
<b>Email:</b> ${order.customer_email}<br>
<b>Total:</b> $${order.amount_total}<br>
<b>Tax:</b> $${order.tax}<br>

<b>Shipping Address:</b><br>
${order.shipping_address.line1 || ""}<br>
${order.shipping_address.city || ""} ${order.shipping_address.state || ""}

<br><br>

<b>Status:</b>
${order.shipped ? "Shipped" : "Not shipped"}

<br>

<input
placeholder="Tracking number"
value="${order.tracking || ""}"
id="track-${order.id}"
>

<br>

<button onclick="markShipped('${order.id}')">
Mark Shipped
</button>

`;

container.appendChild(div);

});

}

async function markShipped(id){

const tracking = document.getElementById("track-"+id).value;

await fetch("/api/orders",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
id,
shipped:true,
tracking
})

});

loadOrders();

}

loadOrders();

</script>

</body>
</html>
