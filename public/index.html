<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Transmission Tools</title>

<style>
body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
color:#111;
}

.site-header{
background:#111;
}

.banner{
width:100%;
background:#000;
margin:0;
padding:0;
}

.banner img{
display:block;
width:100%;
height:auto;
max-height:none;
}

.sticky-nav{
position:sticky;
top:0;
z-index:1000;
background:#111;
border-top:1px solid #222;
border-bottom:1px solid #222;
}

.nav-inner{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
gap:28px;
padding:14px 20px;
flex-wrap:wrap;
}

.nav-inner a{
color:white;
text-decoration:none;
font-weight:bold;
}

.nav-inner a:hover{
text-decoration:underline;
}

.hero{
background:white;
padding:40px 24px;
text-align:center;
border-bottom:1px solid #ddd;
}

.hero h2{
margin-top:0;
font-size:34px;
}

.hero p{
max-width:800px;
margin:auto;
color:#555;
line-height:1.5;
}

.section{
max-width:1200px;
margin:auto;
padding:32px 20px;
}

.section h3{
margin-top:0;
font-size:28px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.06);
display:flex;
flex-direction:column;
}

.image-box{
height:220px;
background:#e9e9e9;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:10px;
box-sizing:border-box;
}

.image-box img{
width:100%;
height:100%;
object-fit:contain;
display:block;
cursor:pointer;
}

.card-content{
padding:18px;
display:flex;
flex-direction:column;
gap:10px;
flex-grow:1;
}

.category{
font-size:12px;
font-weight:bold;
color:#666;
text-transform:uppercase;
letter-spacing:.5px;
}

.card h4{
margin:0;
font-size:20px;
line-height:1.3;
}

.description{
color:#555;
font-size:14px;
line-height:1.5;
min-height:42px;
}

.price{
font-size:22px;
font-weight:bold;
margin-top:auto;
}

.stock{
font-size:13px;
color:#666;
}

.quantity-wrap{
display:flex;
align-items:center;
gap:8px;
margin-top:6px;
}

.quantity-label{
font-size:14px;
font-weight:bold;
color:#333;
min-width:28px;
}

.quantity-controls{
display:inline-flex;
align-items:center;
border:1px solid #ccc;
border-radius:6px;
overflow:hidden;
background:white;
}

.quantity-controls button{
margin:0;
padding:0;
width:36px;
height:36px;
background:#f3f3f3;
color:#111;
border:none;
border-radius:0;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.quantity-controls button:hover{
background:#e3e3e3;
}

.quantity-controls input{
width:56px;
height:36px;
border:none;
border-left:1px solid #ccc;
border-right:1px solid #ccc;
text-align:center;
font-size:15px;
outline:none;
}

.buy-btn{
margin-top:8px;
padding:12px;
background:#111;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
font-size:15px;
font-weight:bold;
}

.buy-btn:hover{
background:#333;
}

footer{
text-align:center;
padding:30px 20px;
color:#666;
font-size:14px;
}

.lightbox{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
align-items:center;
justify-content:center;
z-index:9999;
padding:20px;
box-sizing:border-box;
}

.lightbox.show{
display:flex;
}

.lightbox-content{
position:relative;
max-width:95vw;
max-height:90vh;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.lightbox img{
max-width:95vw;
max-height:65vh;
object-fit:contain;
background:white;
padding:10px;
border-radius:8px;
}

.lightbox-controls{
display:flex;
align-items:center;
gap:12px;
}

.lightbox-controls button{
margin-top:0;
padding:10px 14px;
font-size:16px;
}

.lightbox-counter{
color:white;
font-weight:bold;
min-width:60px;
text-align:center;
}

.thumbnail-strip{
display:flex;
gap:8px;
flex-wrap:wrap;
justify-content:center;
max-width:95vw;
}

.thumbnail{
width:64px;
height:64px;
border:2px solid transparent;
border-radius:6px;
overflow:hidden;
background:white;
cursor:pointer;
padding:0;
}

.thumbnail img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.thumbnail.active{
border-color:#4da3ff;
}

.close-btn{
position:absolute;
top:-10px;
right:-10px;
background:white;
color:black;
border:none;
border-radius:999px;
width:36px;
height:36px;
font-size:20px;
font-weight:bold;
cursor:pointer;
line-height:1;
padding:0;
}

.close-btn:hover{
background:#ddd;
}

@media (max-width:700px){
.hero h2{
font-size:28px;
}
.nav-inner{
gap:18px;
padding:12px 16px;
}
}
</style>
</head>

<body>

<header class="site-header">
  <div class="banner">
    <img src="/logo.png" alt="3D Transmission Tools Banner">
  </div>
  <nav class="sticky-nav">
    <div class="nav-inner">
      <a href="/">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>
</header>

<section class="hero">
<h2>Precision Tools for Transmission Work</h2>
<p>
Browse specialized tools for GM, Ford, Allison, and other transmission applications.
Built to help make service work faster, easier, and more repeatable.
</p>
<p>
<a href="/shop.html">View All Products</a>
</p>
</section>

<section class="section">
<h3>Featured Products</h3>
<div id="products" class="grid"></div>
</section>

<footer>
© 2026 3D Transmission Tools
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeLightbox(event)">×</button>
    <img id="lightbox-img" src="" alt="Full size product image">
    <div class="lightbox-controls">
      <button onclick="prevImage()">‹ Prev</button>
      <div id="lightbox-counter" class="lightbox-counter">1 / 1</div>
      <button onclick="nextImage()">Next ›</button>
    </div>
    <div id="thumbnail-strip" class="thumbnail-strip"></div>
  </div>
</div>

<script src="/cart.js"></script>

<script>
let currentGallery = []
let currentImageIndex = 0

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function getSafeMaxQty(product){
const stock = Number(product.quantity ?? 99)
if(Number.isFinite(stock) && stock > 0){
return Math.min(stock, 99)
}
return 99
}

function changeQty(inputId, delta){
const input = document.getElementById(inputId)
if(!input) return

const min = Number(input.min || 1)
const max = Number(input.max || 99)
const current = Number(input.value || min)
const next = current + delta

input.value = Math.max(min, Math.min(max, next))
}

function getQty(productId){
const input = document.getElementById("qty-" + productId)
if(!input) return 1

const min = Number(input.min || 1)
const max = Number(input.max || 99)
let value = Number(input.value || 1)

if(!Number.isInteger(value) || value < min) value = min
if(value > max) value = max

input.value = value
return value
}

async function loadProducts(){
const res = await fetch("products.json")
const products = await res.json()
const container = document.getElementById("products")
const featuredProducts = products.slice(0,4)

featuredProducts.forEach(product=>{
const card=document.createElement("div")
card.className="card"

const gallery =
product.images && product.images.length
? product.images
: (product.image ? [product.image] : [])

const firstImage = gallery.length ? gallery[0] : ""
const escapedGallery = encodeURIComponent(JSON.stringify(gallery))
const safeId = String(product.id)
const safeName = escapeHtml(product.name)
const safeCategory = escapeHtml(product.category || "General")
const safeDescription = escapeHtml(product.description || "")
const maxQty = getSafeMaxQty(product)

const imageHtml = firstImage
? `<img src="${firstImage}" alt="${safeName}" onclick="openLightbox('${escapedGallery}', 0)">`
: `No Image Yet`

card.innerHTML = `
<div class="image-box">${imageHtml}</div>

<div class="card-content">
<div class="category">${safeCategory}</div>
<h4>${safeName}</h4>
<div class="description">${safeDescription}</div>
<div class="price">$${Number(product.price).toFixed(2)}</div>
<div class="stock">In stock: ${product.quantity ?? 0}</div>

<div class="quantity-wrap">
<div class="quantity-label">Qty</div>
<div class="quantity-controls">
<button type="button" onclick="changeQty('qty-${safeId}', -1)">−</button>
<input
id="qty-${safeId}"
type="number"
min="1"
max="${maxQty}"
value="1"
inputmode="numeric"
>
<button type="button" onclick="changeQty('qty-${safeId}', 1)">+</button>
</div>
</div>

<button class="buy-btn" onclick="addProductToCart('${safeId.replace(/'/g,"\\'")}')">
Add To Cart
</button>
</div>
`

container.appendChild(card)
})
}

function addProductToCart(id){
const quantity = getQty(id)
addToCart(id, quantity)
}

function openLightbox(encodedGallery, startIndex){
currentGallery = JSON.parse(decodeURIComponent(encodedGallery))
currentImageIndex = startIndex || 0
updateLightboxImage()
renderThumbnails()
document.getElementById("lightbox").classList.add("show")
}

function updateLightboxImage(){
if(!currentGallery.length) return
document.getElementById("lightbox-img").src = currentGallery[currentImageIndex]
document.getElementById("lightbox-counter").textContent = `${currentImageIndex + 1} / ${currentGallery.length}`
updateActiveThumbnail()
}

function renderThumbnails(){
const strip = document.getElementById("thumbnail-strip")
strip.innerHTML = ""

currentGallery.forEach((src, index) => {
const thumb = document.createElement("button")
thumb.className = "thumbnail" + (index === currentImageIndex ? " active" : "")
thumb.innerHTML = `<img src="${src}" alt="Thumbnail ${index + 1}">`
thumb.onclick = function(){
currentImageIndex = index
updateLightboxImage()
}
strip.appendChild(thumb)
})
}

function updateActiveThumbnail(){
const thumbs = document.querySelectorAll(".thumbnail")
thumbs.forEach((thumb, index) => {
thumb.classList.toggle("active", index === currentImageIndex)
})
}

function prevImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex - 1 + currentGallery.length) % currentGallery.length
updateLightboxImage()
}

function nextImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex + 1) % currentGallery.length
updateLightboxImage()
}

function closeLightbox(event){
if(event) event.stopPropagation()
document.getElementById("lightbox").classList.remove("show")
}

document.addEventListener("keydown", function(event){
const lightboxOpen = document.getElementById("lightbox").classList.contains("show")
if(!lightboxOpen) return

if(event.key === "Escape") closeLightbox()
if(event.key === "ArrowLeft") prevImage()
if(event.key === "ArrowRight") nextImage()
})

loadProducts()
</script>

</body>
</html>
