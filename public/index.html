<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D Transmission Tools</title>
<link rel="stylesheet" href="/styles.css">

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>

<header class="site-header">
<div class="banner">
<img src="/banner.png" alt="3D Transmission Tools">
</div>
<nav class="sticky-nav">
<div class="nav-inner">
<a href="/">Home</a>
<a href="/shop.html">Shop</a>
<a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
</div>
</nav>
</header>

<section class="hero">
<h2>Precision Tools for Transmission Work</h2>
<p>
Browse specialized tools for GM, Ford, Allison, and other transmission applications.
Built to help make service work faster, easier, and more repeatable.
</p>
<p>
<a href="/shop.html">View All Products</a>
</p>
</section>

<section class="section">
<h3>Featured Products</h3>
<div id="products" class="home-grid"></div>
</section>

<footer>
© 2026 3D Transmission Tools
</footer>

<div id="lightbox" class="lightbox" onclick="closeLightbox(event)">
  <div class="lightbox-content" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeLightbox(event)">×</button>
    <img id="lightbox-img" src="" alt="Full size product image">
    <div class="lightbox-controls">
      <button onclick="prevImage()">‹ Prev</button>
      <div id="lightbox-counter" class="lightbox-counter">1 / 1</div>
      <button onclick="nextImage()">Next ›</button>
    </div>
    <div id="thumbnail-strip" class="thumbnail-strip"></div>
  </div>
</div>

<script src="/cart.js"></script>

<script>
let currentGallery = []
let currentImageIndex = 0

function escapeHtml(value){
return String(value ?? "")
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(/"/g,"&quot;")
.replace(/'/g,"&#39;")
}

function getSafeMaxQty(product){
const stock = Number(product.quantity ?? 99)
if(Number.isFinite(stock) && stock > 0){
return Math.min(stock, 99)
}
return 99
}

function changeQty(inputId, delta){
const input = document.getElementById(inputId)
if(!input) return

const min = Number(input.min || 1)
const max = Number(input.max || 99)
const current = Number(input.value || min)
const next = current + delta

input.value = Math.max(min, Math.min(max, next))
}

function getQty(productId){
const input = document.getElementById("qty-" + productId)
if(!input) return 1

const min = Number(input.min || 1)
const max = Number(input.max || 99)
let value = Number(input.value || 1)

if(!Number.isInteger(value) || value < min) value = min
if(value > max) value = max

input.value = value
return value
}

async function loadProducts(){
const res = await fetch("products.json")
const products = await res.json()
const container = document.getElementById("products")
const featuredProducts = products.slice(0,4)

featuredProducts.forEach(product=>{
const card=document.createElement("div")
card.className="home-card"

const gallery =
product.images && product.images.length
? product.images
: (product.image ? [product.image] : [])

const firstImage = gallery.length ? gallery[0] : ""
const escapedGallery = encodeURIComponent(JSON.stringify(gallery))
const safeId = String(product.id)
const safeName = escapeHtml(product.name)
const safeCategory = escapeHtml(product.category || "General")
const safeDescription = escapeHtml(product.description || "")
const maxQty = getSafeMaxQty(product)

const imageHtml = firstImage
? `<img src="${firstImage}" alt="${safeName}" onclick="openLightbox('${escapedGallery}', 0)">`
: `No Image Yet`

card.innerHTML = `
<div class="image-box">${imageHtml}</div>

<div class="card-content">
<div class="category">${safeCategory}</div>
<h4>${safeName}</h4>
<div class="description">${safeDescription}</div>
<div class="price">$${Number(product.price).toFixed(2)}</div>
<div class="stock">In stock: ${product.quantity ?? 0}</div>

<div class="quantity-wrap">
<div class="quantity-label">Qty</div>
<div class="quantity-controls">
<button type="button" onclick="changeQty('qty-${safeId}', -1)">−</button>
<input
id="qty-${safeId}"
type="number"
min="1"
max="${maxQty}"
value="1"
inputmode="numeric"
>
<button type="button" onclick="changeQty('qty-${safeId}', 1)">+</button>
</div>
</div>

<button class="buy-btn" onclick="addProductToCart('${safeId.replace(/'/g,"\\'")}')">
Add To Cart
</button>
</div>
`

container.appendChild(card)
})
}

function addProductToCart(id){
const quantity = getQty(id)
addToCart(id, quantity)
}

function openLightbox(encodedGallery, startIndex){
currentGallery = JSON.parse(decodeURIComponent(encodedGallery))
currentImageIndex = startIndex || 0
updateLightboxImage()
renderThumbnails()
document.getElementById("lightbox").classList.add("show")
}

function updateLightboxImage(){
if(!currentGallery.length) return
document.getElementById("lightbox-img").src = currentGallery[currentImageIndex]
document.getElementById("lightbox-counter").textContent = `${currentImageIndex + 1} / ${currentGallery.length}`
updateActiveThumbnail()
}

function renderThumbnails(){
const strip = document.getElementById("thumbnail-strip")
strip.innerHTML = ""

currentGallery.forEach((src, index) => {
const thumb = document.createElement("button")
thumb.className = "thumbnail" + (index === currentImageIndex ? " active" : "")
thumb.innerHTML = `<img src="${src}" alt="Thumbnail ${index + 1}">`
thumb.onclick = function(){
currentImageIndex = index
updateLightboxImage()
}
strip.appendChild(thumb)
})
}

function updateActiveThumbnail(){
const thumbs = document.querySelectorAll(".thumbnail")
thumbs.forEach((thumb, index) => {
thumb.classList.toggle("active", index === currentImageIndex)
})
}

function prevImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex - 1 + currentGallery.length) % currentGallery.length
updateLightboxImage()
}

function nextImage(){
if(!currentGallery.length) return
currentImageIndex = (currentImageIndex + 1) % currentGallery.length
updateLightboxImage()
}

function closeLightbox(event){
if(event) event.stopPropagation()
document.getElementById("lightbox").classList.remove("show")
}

document.addEventListener("keydown", function(event){
const lightboxOpen = document.getElementById("lightbox").classList.contains("show")
if(!lightboxOpen) return

if(event.key === "Escape") closeLightbox()
if(event.key === "ArrowLeft") prevImage()
if(event.key === "ArrowRight") nextImage()
})

loadProducts()
</script>

</body>
</html>
