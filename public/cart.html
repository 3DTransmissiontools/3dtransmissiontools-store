<!-- /public/cart.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Cart - 3D Transmission Tools</title>
<link rel="stylesheet" href="/styles.css">
</head>

<body>

<header class="site-header">
  <div class="banner">
    <img src="/banner.png" alt="3D Transmission Tools Banner">
  </div>
  <nav class="sticky-nav">
    <div class="nav-inner">
      <a href="/">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/cart.html">Cart (<span id="cart-count">0</span>)</a>
    </div>
  </nav>
</header>

<div class="page-wrap">
<div class="cart-container">

<div class="top-links">
<a href="/">Home</a>
<a href="/shop.html">Continue Shopping</a>
</div>

<h1>Your Cart</h1>

<div id="cart-items"></div>

<div class="summary">
  <div class="summary-row estimate">
    <span>Estimated package weight:</span>
    <span id="estimated-weight">0 oz</span>
  </div>

  <div class="summary-row total">
    <span>Subtotal:</span>
    <span>$<span id="subtotal">0.00</span></span>
  </div>

  <div class="shipping-block">
    <div class="shipping-title">Choose Your Shipping Estimate</div>

    <label id="ground-option" class="shipping-option selected">
      <div class="shipping-option-left">
        <input type="radio" name="shippingMethod" value="ground" checked onchange="setPreferredShipping('ground')">
        <div>
          <div class="shipping-option-name">USPS Ground Advantage</div>
          <div class="shipping-option-meta">Economy shipping</div>
        </div>
      </div>
      <div id="estimated-ground">$0.00</div>
    </label>

    <label id="priority-option" class="shipping-option">
      <div class="shipping-option-left">
        <input type="radio" name="shippingMethod" value="priority" onchange="setPreferredShipping('priority')">
        <div>
          <div class="shipping-option-name">USPS Priority Mail</div>
          <div class="shipping-option-meta">Faster delivery</div>
        </div>
      </div>
      <div id="estimated-priority">$0.00</div>
    </label>
  </div>

  <div class="summary-row grand-total">
    <span>Estimated Order Total:</span>
    <span>$<span id="estimated-total-selected">0.00</span></span>
  </div>
</div>

<div class="actions">
<button onclick="checkout()">Checkout</button>
<button class="secondary-btn" onclick="handleClearCart()">Clear Cart</button>
</div>

<div class="note">
Shipping and taxes are finalized at checkout. The total shown here includes subtotal plus your selected shipping estimate, but not tax.
</div>

</div>
</div>

<script src="/cart.js"></script>

<script>
let products = []
let preferredShipping = localStorage.getItem("preferredShippingMethod") || "ground"

async function loadProducts(){
try{
const res = await fetch("/products.json")
products = await res.json()
syncSelectedShippingUI()
renderCart()
}catch(error){
console.error("Failed to load products:", error)
document.getElementById("cart-items").innerHTML = `<div class="empty">Unable to load cart items right now.</div>`
}
}

function getWeightOz(product){
const weight = Number(product.weight_oz)
if(!Number.isFinite(weight) || weight <= 0){
return 0
}
return weight
}

function getEstimatedGroundShipping(totalWeightOz){
if(totalWeightOz <= 0) return 0
if(totalWeightOz <= 16) return 595
if(totalWeightOz <= 32) return 895
if(totalWeightOz <= 48) return 1195
if(totalWeightOz <= 64) return 1495
return 1895
}

function getEstimatedPriorityShipping(totalWeightOz){
if(totalWeightOz <= 0) return 0
if(totalWeightOz <= 16) return 1095
if(totalWeightOz <= 32) return 1495
if(totalWeightOz <= 48) return 1895
if(totalWeightOz <= 64) return 2495
return 3295
}

function formatWeight(totalWeightOz){
if(totalWeightOz <= 0) return "0 oz"

if(totalWeightOz >= 16){
const pounds = Math.floor(totalWeightOz / 16)
const ounces = totalWeightOz % 16

if(ounces === 0){
return `${pounds} lb`
}

return `${pounds} lb ${ounces} oz`
}

return `${totalWeightOz} oz`
}

function setPreferredShipping(method){
preferredShipping = method === "priority" ? "priority" : "ground"
localStorage.setItem("preferredShippingMethod", preferredShipping)
syncSelectedShippingUI()
renderCart()
}

function syncSelectedShippingUI(){
const groundRadio = document.querySelector('input[name="shippingMethod"][value="ground"]')
const priorityRadio = document.querySelector('input[name="shippingMethod"][value="priority"]')
const groundOption = document.getElementById("ground-option")
const priorityOption = document.getElementById("priority-option")

if(groundRadio) groundRadio.checked = preferredShipping === "ground"
if(priorityRadio) priorityRadio.checked = preferredShipping === "priority"

if(groundOption) groundOption.classList.toggle("selected", preferredShipping === "ground")
if(priorityOption) priorityOption.classList.toggle("selected", preferredShipping === "priority")
}

function renderCart(){
const cart = getCart()
const container = document.getElementById("cart-items")

container.innerHTML = ""

let subtotal = 0
let totalWeightOz = 0

if(!cart.length){
container.innerHTML = `<div class="empty">Your cart is empty.</div>`
document.getElementById("subtotal").textContent = "0.00"
document.getElementById("estimated-weight").textContent = "0 oz"
document.getElementById("estimated-ground").textContent = "$0.00"
document.getElementById("estimated-priority").textContent = "$0.00"
document.getElementById("estimated-total-selected").textContent = "0.00"
return
}

cart.forEach(item => {
const product = products.find(p => p.id === item.id)

if(!product) return

const itemQty = Number(item.quantity) || 1
const itemPrice = Number(product.price) || 0
const itemWeight = getWeightOz(product)

subtotal += itemPrice * itemQty
totalWeightOz += itemWeight * itemQty

const div = document.createElement("div")
div.className = "item"

div.innerHTML = `
<div class="item-info">
<div class="item-name">${product.name}</div>
<div class="item-price">$${itemPrice.toFixed(2)} each</div>
<div class="item-meta">Weight: ${itemWeight} oz each</div>
</div>

<div class="item-actions">
<input
type="number"
value="${itemQty}"
min="1"
max="${product.quantity ?? 99}"
onchange="updateQuantityAndRefresh('${item.id}', this.value)"
>
<button onclick="removeItemAndRefresh('${item.id}')">Remove</button>
</div>
`

container.appendChild(div)
})

const estimatedGroundCents = getEstimatedGroundShipping(totalWeightOz)
const estimatedPriorityCents = getEstimatedPriorityShipping(totalWeightOz)
const selectedShippingCents = preferredShipping === "priority" ? estimatedPriorityCents : estimatedGroundCents
const estimatedTotal = subtotal + (selectedShippingCents / 100)

document.getElementById("subtotal").textContent = subtotal.toFixed(2)
document.getElementById("estimated-weight").textContent = formatWeight(totalWeightOz)
document.getElementById("estimated-ground").textContent = `$${(estimatedGroundCents / 100).toFixed(2)}`
document.getElementById("estimated-priority").textContent = `$${(estimatedPriorityCents / 100).toFixed(2)}`
document.getElementById("estimated-total-selected").textContent = estimatedTotal.toFixed(2)
}

function updateQuantityAndRefresh(id, value){
updateQuantity(id, parseInt(value, 10))
renderCart()
}

function removeItemAndRefresh(id){
removeFromCart(id)
renderCart()
}

function handleClearCart(){
if(!getCart().length) return
clearCart()
renderCart()
}

async function checkout(){
const cart = getCart()

if(!cart.length){
alert("Your cart is empty.")
return
}

try{
const res = await fetch("/api/create-checkout-session", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
items: cart,
preferredShippingMethod: preferredShipping
})
})

const data = await res.json()

if(!res.ok){
alert(data.error || "Checkout failed")
return
}

if(!data.url){
alert("Checkout URL was not returned")
return
}

window.location = data.url
}catch(error){
console.error("Checkout failed:", error)
alert("Unable to start checkout right now.")
}
}

loadProducts()
</script>

</body>
</html>
